apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-tools-cert-manager
  namespace: flux-system
spec:
  interval: 5m0s
  retryInterval: 1m0s
  timeout: 10m0s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra-tools
  path: ./platform/platform/platform-ci-cd-zero-trust/cert-manager
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cert-manager
      namespace: cert-manager
