apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-tools-tekton
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-tools-tekton-operator
    - name: infra-tools-identity
    - name: infra-tools-secrets
    - name: infra-tools-cert-manager
    - name: infra-tools-keycloak-bootstrap
    - name: infra-tools-harbor
  interval: 5m0s
  retryInterval: 1m0s
  timeout: 10m0s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra-tools
  path: ./platform/platform/platform-ci-cd-zero-trust/tekton
