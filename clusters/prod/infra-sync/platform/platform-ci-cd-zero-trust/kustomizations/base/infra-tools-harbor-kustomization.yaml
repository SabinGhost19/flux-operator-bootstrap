apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-tools-harbor
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-tools-secrets
  interval: 5m0s
  retryInterval: 1m0s
  timeout: 15m0s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra-tools
  path: ./platform/platform/platform-ci-cd-zero-trust/harbor
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: harbor
      namespace: harbor
