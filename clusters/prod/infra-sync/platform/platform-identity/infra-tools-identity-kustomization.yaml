apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-tools-identity
  namespace: flux-system
spec:
  interval: 5m0s
  retryInterval: 1m0s
  timeout: 5m0s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra-tools
  path: ./platform/platform/platform-identity/keycloak
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: keycloak
      namespace: platform-identity
